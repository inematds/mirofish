services:
  mirofish:
    build: .
    container_name: mirofish
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Route on both HTTP and HTTPS (Cloudflare sends on 443)
      - "traefik.http.routers.mirofish-http.rule=Host(`synth.scty.org`)"
      - "traefik.http.routers.mirofish-http.entrypoints=http"
      - "traefik.http.routers.mirofish-http.service=mirofish"
      - "traefik.http.routers.mirofish-https.rule=Host(`synth.scty.org`)"
      - "traefik.http.routers.mirofish-https.entrypoints=https"
      - "traefik.http.routers.mirofish-https.tls=true"
      - "traefik.http.routers.mirofish-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mirofish-https.service=mirofish"
      # Vite dev server proxies /api to backend, so just route everything to port 3000
      - "traefik.http.services.mirofish.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
